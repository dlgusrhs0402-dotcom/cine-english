<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WBS — CineEnglish</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #fff; color: #111; padding: 48px 80px 80px; }

  .header { display: flex; align-items: flex-end; justify-content: space-between; border-bottom: 2px solid #111; padding-bottom: 20px; margin-bottom: 36px; }
  .back { font-size: 13px; color: #888; text-decoration: none; display: block; margin-bottom: 8px; }
  .back:hover { color: #111; }
  .header h1 { font-size: 32px; font-weight: 700; }
  .header h1 span { color: #e05a2b; }
  .header-sub { font-size: 13px; color: #aaa; margin-top: 4px; }

  .legend { display: flex; gap: 16px; }
  .leg { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #666; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }

  /* summary */
  .summary { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 32px; }
  .sum-card { border: 1px solid #eee; border-radius: 8px; padding: 16px 20px; }
  .sum-label { font-size: 11px; color: #aaa; letter-spacing: 0.1em; margin-bottom: 6px; }
  .sum-val { font-size: 32px; font-weight: 700; }
  .c-orange { color: #e05a2b; }
  .c-green  { color: #3daf6d; }
  .c-blue   { color: #3a7fe0; }
  .c-gray   { color: #aaa; }

  /* progress */
  .prog-wrap { margin-bottom: 36px; }
  .prog-label { display: flex; justify-content: space-between; font-size: 12px; color: #aaa; margin-bottom: 6px; }
  .prog-bg { height: 6px; background: #f0f0f0; border-radius: 3px; overflow: hidden; }
  .prog-fill { height: 100%; background: #111; border-radius: 3px; transition: width 1s ease; }

  /* table */
  .phase { margin-bottom: 40px; }
  .phase-head { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .phase-title { font-size: 16px; font-weight: 700; }
  .phase-badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 999px; background: #f0f0f0; color: #666; }
  .phase-pct { font-size: 12px; color: #aaa; margin-left: auto; }

  table { width: 100%; border-collapse: collapse; }
  thead th { text-align: left; font-size: 11px; color: #aaa; letter-spacing: 0.1em; padding: 8px 12px; border-bottom: 1px solid #eee; font-weight: 400; text-transform: uppercase; }
  tbody tr { border-bottom: 1px solid #f5f5f5; }
  tbody tr:hover { background: #fafafa; }
  td { padding: 10px 12px; font-size: 13px; }
  .td-id { color: #ccc; font-size: 11px; width: 50px; }
  .td-task { font-weight: 400; }
  .td-sub { font-size: 11px; color: #aaa; margin-top: 2px; }
  .td-date { color: #aaa; font-size: 12px; width: 80px; }
  .td-status { width: 90px; }
  .td-bar { width: 130px; }

  .pill { display: inline-flex; align-items: center; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 999px; }
  .pill-done    { background: #edfaf3; color: #3daf6d; }
  .pill-doing   { background: #edf3fa; color: #3a7fe0; }
  .pill-todo    { background: #f5f5f5; color: #aaa; }

  .bar-bg { height: 4px; background: #f0f0f0; border-radius: 2px; overflow: hidden; margin-top: 4px; }
  .bar-fill { height: 100%; border-radius: 2px; }
  .bar-done  { background: #3daf6d; }
  .bar-doing { background: #3a7fe0; }
  .bar-todo  { background: #ddd; }
  .bar-pct { font-size: 10px; color: #aaa; }

  .footer { margin-top: 40px; font-size: 11px; color: #ccc; text-align: center; }
</style>
</head>
<body>

<div class="header">
  <div>
    <a class="back" href="./index.html">← 발표자료로 돌아가기</a>
    <h1>Cine<span>English</span> — WBS</h1>
    <div class="header-sub">Work Breakdown Structure · 2025 중간발표 기준</div>
  </div>
  <div class="legend">
    <div class="leg"><div class="dot" style="background:#3daf6d"></div>완료</div>
    <div class="leg"><div class="dot" style="background:#3a7fe0"></div>진행중</div>
    <div class="leg"><div class="dot" style="background:#ccc"></div>예정</div>
  </div>
</div>

<div class="summary">
  <div class="sum-card"><div class="sum-label">전체 진행률</div><div class="sum-val c-orange" id="pct">—</div></div>
  <div class="sum-card"><div class="sum-label">완료</div><div class="sum-val c-green" id="done">—</div></div>
  <div class="sum-card"><div class="sum-label">진행중</div><div class="sum-val c-blue" id="doing">—</div></div>
  <div class="sum-card"><div class="sum-label">예정</div><div class="sum-val c-gray" id="todo">—</div></div>
</div>

<div class="prog-wrap">
  <div class="prog-label"><span>전체 진행률</span><span id="pctText">0%</span></div>
  <div class="prog-bg"><div class="prog-fill" id="fill" style="width:0"></div></div>
</div>

<div id="root"></div>
<div class="footer">CineEnglish · dlgusrhs0402 · GitHub Pages</div>

<script>
const data = [
  { phase:"1. 기획", tasks:[
    { id:"1.1", task:"주제 선정 및 컨셉 구체화", sub:"영화 대사 발음 학습 앱", date:"W1", status:"done", pct:100 },
    { id:"1.2", task:"타겟 사용자 분석", sub:"전 레벨 학습자 페르소나", date:"W1", status:"done", pct:100 },
    { id:"1.3", task:"유사 서비스 벤치마킹", sub:"Elsa Speak, FluentU", date:"W1", status:"done", pct:100 },
    { id:"1.4", task:"핵심 기능 정의 (MVP)", sub:"발음 따라말하기, AI 대사 생성, 레벨 분기", date:"W2", status:"done", pct:100 },
    { id:"1.5", task:"WBS 작성 및 일정 수립", sub:"8주 전체 일정", date:"W2", status:"done", pct:100 },
  ]},
  { phase:"2. 설계", tasks:[
    { id:"2.1", task:"UI/UX 와이어프레임", sub:"주요 화면 흐름 설계", date:"W3", status:"done", pct:100 },
    { id:"2.2", task:"시스템 아키텍처 설계", sub:"Frontend · AI · Storage 구성", date:"W3", status:"done", pct:100 },
    { id:"2.3", task:"Claude API 프롬프트 설계", sub:"대사 생성·발음 분석 명세", date:"W4", status:"done", pct:100 },
    { id:"2.4", task:"데이터 구조 설계", sub:"학습 기록·XP·레벨 JSON 스키마", date:"W4", status:"doing", pct:60 },
    { id:"2.5", task:"발음 평가 알고리즘 검토", sub:"Web Speech API 활용 방안", date:"W4", status:"doing", pct:40 },
  ]},
  { phase:"3. 개발", tasks:[
    { id:"3.1", task:"프로젝트 초기 세팅", sub:"GitHub Pages 배포 환경", date:"W5", status:"done", pct:100 },
    { id:"3.2", task:"UI 컴포넌트 개발", sub:"레벨 선택, 장르 선택, 대사 카드", date:"W5", status:"doing", pct:70 },
    { id:"3.3", task:"Claude API 연동", sub:"대사 생성 JSON 파싱 및 렌더링", date:"W5", status:"doing", pct:80 },
    { id:"3.4", task:"TTS 재생 기능", sub:"Web Speech API 원어민 발음 재생", date:"W6", status:"doing", pct:50 },
    { id:"3.5", task:"발음 녹음 기능", sub:"MediaRecorder API", date:"W6", status:"todo", pct:0 },
    { id:"3.6", task:"발음 비교·채점 로직", sub:"STT 기반 비교", date:"W6-7", status:"todo", pct:0 },
    { id:"3.7", task:"학습 기록·XP 시스템", sub:"LocalStorage 기반 진도 저장", date:"W7", status:"todo", pct:0 },
    { id:"3.8", task:"반응형 레이아웃", sub:"모바일·태블릿 대응", date:"W7", status:"todo", pct:0 },
  ]},
  { phase:"4. 테스트 및 배포", tasks:[
    { id:"4.1", task:"기능 통합 테스트", sub:"전체 학습 플로우 검증", date:"W8", status:"todo", pct:0 },
    { id:"4.2", task:"발음 정확도 검증", sub:"레벨별 난이도 적정성 확인", date:"W8", status:"todo", pct:0 },
    { id:"4.3", task:"GitHub Pages 최종 배포", sub:"index.html 배포 확인", date:"W8", status:"todo", pct:0 },
    { id:"4.4", task:"최종 발표자료 완성", sub:"슬라이드·데모 URL 준비", date:"W8", status:"todo", pct:0 },
  ]},
];

const pill = s => ({
  done:  '<span class="pill pill-done">✓ 완료</span>',
  doing: '<span class="pill pill-doing">▶ 진행중</span>',
  todo:  '<span class="pill pill-todo">○ 예정</span>',
}[s]);

const barCls = s => ({ done:'bar-done', doing:'bar-doing', todo:'bar-todo' }[s]);

const root = document.getElementById('root');
let tDone=0, tDoing=0, tTodo=0;

data.forEach(ph => {
  const done = ph.tasks.filter(t=>t.status==='done').length;
  const doing = ph.tasks.filter(t=>t.status==='doing').length;
  const todo  = ph.tasks.filter(t=>t.status==='todo').length;
  tDone+=done; tDoing+=doing; tTodo+=todo;

  root.innerHTML += `
  <div class="phase">
    <div class="phase-head">
      <span class="phase-title">${ph.phase}</span>
      <span class="phase-badge">${done}/${ph.tasks.length} 완료</span>
      <span class="phase-pct">${Math.round(done/ph.tasks.length*100)}%</span>
    </div>
    <table>
      <thead><tr>
        <th>ID</th><th>태스크</th><th>일정</th><th>상태</th><th>진행률</th>
      </tr></thead>
      <tbody>
        ${ph.tasks.map(t=>`
        <tr>
          <td class="td-id">${t.id}</td>
          <td class="td-task">${t.task}<div class="td-sub">${t.sub}</div></td>
          <td class="td-date">${t.date}</td>
          <td class="td-status">${pill(t.status)}</td>
          <td class="td-bar">
            <div class="bar-pct">${t.pct}%</div>
            <div class="bar-bg"><div class="bar-fill ${barCls(t.status)}" style="width:${t.pct}%"></div></div>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
});

const total = tDone+tDoing+tTodo;
const pct = Math.round(tDone/total*100);
document.getElementById('pct').textContent = pct+'%';
document.getElementById('done').textContent = tDone;
document.getElementById('doing').textContent = tDoing;
document.getElementById('todo').textContent = tTodo;
document.getElementById('pctText').textContent = pct+'%';
setTimeout(()=>{ document.getElementById('fill').style.width = pct+'%'; }, 100);
</script>
</body>
</html>
